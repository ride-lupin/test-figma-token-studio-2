name: Sync Design Tokens

on:
  push:
    branches:
      - tokens/sync
    paths:
      - tokens.json
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    name: Validate, Diff & Create PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ① 유효성 검증 — 실패 시 워크플로우 중단, PR 미생성
      - name: Validate tokens.json
        run: node scripts/validate.js

      # ② Diff 분석 — GitHub Actions Summary + .diff-report.md 생성
      - name: Generate diff report
        run: node scripts/diff.js

      # ③ PR 자동 생성 / 업데이트
      - name: Create or update Pull Request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="chore(tokens): ${{ github.event.head_commit.message }}"

          # tokens 라벨이 없으면 생성
          gh label create tokens --color 0075ca --description "Design token changes" 2>/dev/null || true

          # 이미 열린 PR이 있는지 확인
          PR_DATA=$(gh pr list --base main --head tokens/sync --state open --json number,url --jq '.[0]' 2>/dev/null)

          if [ -n "$PR_DATA" ] && [ "$PR_DATA" != "null" ]; then
            # 기존 PR 업데이트
            PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
            PR_URL=$(echo "$PR_DATA" | jq -r '.url')
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file .diff-report.md
          else
            # 새 PR 생성
            PR_URL=$(gh pr create \
              --base main \
              --head tokens/sync \
              --title "$TITLE" \
              --body-file .diff-report.md \
              --label tokens)
            PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq '.number')
          fi

          echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Print PR URL
        if: steps.create_pr.outputs.pull-request-url != ''
        run: echo "PR created/updated → ${{ steps.create_pr.outputs.pull-request-url }}"

      # ④ 알림 (PR URL 포함) — 실패해도 워크플로우 성공 유지
      - name: Notify (Slack / Notion / PR comment)
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: node scripts/notify.js
